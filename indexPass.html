<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
	<link rel="icon" type="image/x-icon" href="img/bigTokenFavicon.ico">
    <link rel="apple-touch-icon" href="img/bigTokenFavicon.png">
	<meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>My Passes</title>
    <link rel="stylesheet" href="stylePass.css">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="icon-circle" style="font-size:45px;">
            ↻
        </button>
        <button class="icon-circle">
            <img src="img/profile.png" width="45px"/>
        </button>
    </div>
    <h1>My Passes</h1>
    <button class="pass-card" <button onclick="navigateTo('indexTicket.html')">
        <div class="card-top">
            <div class="id-required">
                ID Required
            </div>
            <div class="time-header">
                Time Left
            </div>
        </div>
        <div class="card-body">
            <div class="pass-info">
                <div class="logo-container">
                 <img src="img/StarTran.png" alt="StarTran Logo" class="logo-image">
               </div>
                <div class="pass-details">
                    <div class="title">
                        Low Income Fixed Route
                    </div>
                    <div class="duration">
                        31-Day
                    </div>
                </div>
            </div>
            <div class="days-left">
                <div class="number">
                    21
                </div>
                <div class="label">
                    days
                </div>
            </div>
        </div>
	</button>
</div>
<div class="buy-container" style="padding-bottom: 100px;">
    <button
        class="buy-btn"
        onclick="window.location.href='https://www.startran.lincoln.ne.gov'">
        Buy Passes
    </button>
</div>
</body>
</html>

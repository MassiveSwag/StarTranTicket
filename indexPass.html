<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
	<link rel="icon" type="image/x-icon" href="img/bigTokenFavicon.ico">
    <link rel="apple-touch-icon" href="img/bigTokenFavicon.png">
	<meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<title>My Passes</title>
    <link rel="stylesheet" href="style.css">
	<script src="app.js" defer></script>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="icon-circle">
            ↻
        </button>
        <button class="icon-circle">
            👤
        </button>
    </div>
    <h1>My Passes</h1>
    <button class="pass-card" onclick="loadContent('html1')">
        <div class="card-top">
            <div class="id-required">
                ID Required
            </div>
            <div class="time-header">
                Time Left
            </div>
        </div>
        <div class="card-body">
            <div class="pass-info">
                <div class="logo-container">
                 <img src="img/StarTran.png" alt="StarTran Logo" class="logo-image">
               </div>
                <div class="pass-details">
                    <div class="title">
                        Low Income Fixed Route
                    </div>
                    <div class="duration">
                        31-Day
                    </div>
                </div>
            </div>
            <div class="days-left">
                <div class="number">
                    21
                </div>
                <div class="label">
                    days
                </div>
            </div>
        </div>
	</button>
	
</div>
<div class="buy-container">
    <button
        class="buy-btn"
        onclick="window.location.href='https://www.startran.lincoln.ne.gov'">
        Buy Passes
    </button>
</div>
<script>
	  	async function loadContent() {
			try {
				const [response1, response2] = await Promise.all([
					fetch('indexPass.html'),
					fetch('indexTicket.html')
			    ]);
				
				const html2 = await response1.text();
				const html1 = await response2.text();
				
				document.getElementById('section-one').innerHTML = html1;
				document.getElementById('section-two').innerHTML = html2;
			} catch (error) {
				console.error('Error loading pages:', error);
			}
		}
</script>
</body>
</html>

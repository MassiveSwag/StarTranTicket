<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Passes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="top-bar">
        <button class="icon-circle">
            ↻
        </button>
        <button class="icon-circle">
            👤
        </button>
    </div>
    <h1>My Passes</h1>
    <button class="pass-card" onclick="window.location.href='https://massiveswag.github.io/StarTran/index.html'">
        <div class="card-top">
            <div class="id-required">
                ID Required
            </div>
            <div class="time-header">
                Time Left
            </div>
        </div>
        <div class="card-body">
            <div class="pass-info">
                <div class="logo-container">
                 <img src="img/StarTran.png" alt="StarTran Logo" class="logo-image">
               </div>
                <div class="pass-details">
                    <div class="title">
                        Low Income Fixed Route
                    </div>
                    <div class="duration">
                        31-Day
                    </div>
                </div>
            </div>
            <div class="days-left">
                <div class="number">
                    17
                </div>
                <div class="label">
                    days
                </div>
            </div>
        </div>
    </button>
</div>
<div class="buy-container">
    <button
        class="buy-btn"
        onclick="window.location.href='https://www.startran.lincoln.ne.gov'">
        Buy Passes
    </button>
</div>
</body>
</html>
